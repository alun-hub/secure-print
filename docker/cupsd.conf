# =============================================================================
# CUPS - Central säker utskriftsserver
# =============================================================================

# Nätverk
Listen *:631
ServerAlias *
ServerName spooler.company.com

# TLS - obligatoriskt för alla anslutningar
Encryption Required
ServerCertificate /etc/cups/ssl/server.crt
ServerKey         /etc/cups/ssl/server.key
SSLOptions        NoSSLv3 NoTLSv1 NoTLSv1_1

# Kerberos (SPNEGO) för klientautentisering
DefaultAuthType   Negotiate
DefaultEncryption Required
KerberosKeytab    /etc/cups/cups.keytab

# Loggning - metadata loggas, inte jobbinnehåll
LogLevel          warn
AccessLogLevel    actions
PageLogFormat     "%j %u %T %P %C %{job-name} %{job-originating-host-name}"

# Prestandagränser
MaxJobs           1000
MaxJobsPerUser    50
MaxJobsPerPrinter 200

# =============================================================================
# Åtkomstkontroll
# =============================================================================

<Location />
  Order allow,deny
  Allow all
</Location>

# Admin: bara lokalt (health checks och liveness probes)
<Location /admin>
  Order allow,deny
  Allow from 127.0.0.1
  AuthType Basic
  Require user @SYSTEM
</Location>

# Köer: Kerberos krävs
<Location /printers>
  Order allow,deny
  Allow all
  AuthType Negotiate
  Require valid-user
</Location>

# =============================================================================
# Policy för s3-queue
# =============================================================================

<Policy s3-policy>

  # Skicka jobb: kräver giltig Kerberos-biljett
  # UPN sätts automatiskt från den autentiserade identiteten
  <Limit Create-Job Print-Job Send-Document Send-URI Validate-Job>
    AuthType Negotiate
    Require valid-user
    Order deny,allow
  </Limit>

  # Statusförfrågningar: tillåts autentiserade användare
  <Limit Get-Job-Attributes Get-Printer-Attributes>
    AuthType Negotiate
    Require valid-user
    Order deny,allow
  </Limit>

  # Avbryta egna jobb
  <Limit Cancel-Job>
    AuthType Negotiate
    Require user @OWNER @SYSTEM
    Order deny,allow
  </Limit>

  # Allt annat nekas
  <Limit All>
    Order deny,allow
  </Limit>

</Policy>
