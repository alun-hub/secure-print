# =============================================================================
# CUPS – lokal testconfig (ingen Kerberos, ingen TLS-krav)
# Används av docker-compose.yml via volym-mount
# =============================================================================

Listen *:631
ServerAlias *
Encryption IfRequested     # TLS erbjuds men krävs inte

LogLevel    debug           # Verbose i testläge
AccessLogLevel all
PageLogFormat "%j %u %T %P %C %{job-name}"

# Ingen autentisering – username sätts via lpr -U
DefaultAuthType None

MaxJobs 100

<Location />
  Order allow,deny
  Allow all
</Location>

<Location /admin>
  Order allow,deny
  Allow all
</Location>

<Location /printers>
  Order allow,deny
  Allow all
</Location>

# Tillåt allt i testläge
<Policy default>
  <Limit All>
    Order allow,deny
    Allow all
  </Limit>
</Policy>
