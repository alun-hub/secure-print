# =============================================================================
# CUPS cups-files.conf – lokal testmiljö
# (CUPS 2.4+: SetEnv/PassEnv hör hit, inte i cupsd.conf)
# =============================================================================

# Backends ärver inte containerns miljövariabler – sätt dem explicit
SetEnv CERT_STORE_PATH /etc/cups/test/certs.json
SetEnv TEST_MODE       1
SetEnv DATABASE_URL    postgresql://printuser:printpass@postgres/secure_print
SetEnv S3_ENDPOINT     http://minio:9000
SetEnv S3_ACCESS_KEY   minioadmin
SetEnv S3_SECRET_KEY   minioadmin123
SetEnv S3_BUCKET       secure-print-jobs
