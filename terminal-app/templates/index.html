<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Säker utskrift</title>
  <style>
    /* ── Reset och grundstil ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1a1a2e;
      color: #eee;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      user-select: none;
    }

    /* ── Sektioner ── */
    .section { display: none; text-align: center; width: 100%; max-width: 520px; padding: 2rem; }
    .section.active { display: flex; flex-direction: column; align-items: center; gap: 1.5rem; }

    h1 { font-size: 2rem; font-weight: 600; }
    p  { font-size: 1.1rem; color: #aaa; }

    /* ── Kortikon ── */
    .card-icon {
      font-size: 5rem;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

    /* ── PIN-knappsats ── */
    .pin-display {
      font-size: 2.5rem;
      letter-spacing: 0.8rem;
      height: 3rem;
      color: #fff;
    }

    .numpad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.75rem;
      width: 280px;
    }

    .numpad button {
      background: #2a2a4a;
      border: 2px solid #3a3a6a;
      border-radius: 12px;
      color: #fff;
      font-size: 1.8rem;
      padding: 1rem;
      cursor: pointer;
      transition: background 0.1s, transform 0.1s;
    }
    .numpad button:active { background: #4a4a8a; transform: scale(0.95); }
    .numpad .btn-clear { color: #f87171; }
    .numpad .btn-ok    { background: #1d6f42; border-color: #27a05f; color: #fff; }
    .numpad .btn-ok:active { background: #27a05f; }

    /* ── Jobblista ── */
    .user-header {
      display: flex; align-items: center; gap: 1rem;
      background: #2a2a4a; border-radius: 12px; padding: 1rem 1.5rem;
      width: 100%;
    }
    .user-avatar {
      width: 48px; height: 48px; border-radius: 50%;
      background: #4a4a8a; display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem;
    }
    .user-name { font-size: 1.1rem; font-weight: 600; text-align: left; }
    .user-upn  { font-size: 0.85rem; color: #888; }

    .jobs-list { width: 100%; display: flex; flex-direction: column; gap: 0.75rem; }

    .job-card {
      background: #2a2a4a;
      border: 1px solid #3a3a6a;
      border-radius: 12px;
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      text-align: left;
    }
    .job-icon { font-size: 2rem; }
    .job-info { flex: 1; }
    .job-title { font-size: 1rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 220px; }
    .job-meta  { font-size: 0.8rem; color: #888; margin-top: 0.2rem; }

    .job-actions { display: flex; gap: 0.5rem; }

    .btn-print  { background: #1d6f42; border: none; color: #fff; border-radius: 8px; padding: 0.6rem 1rem; font-size: 0.95rem; cursor: pointer; }
    .btn-cancel { background: transparent; border: 1px solid #555; color: #aaa; border-radius: 8px; padding: 0.6rem 0.8rem; font-size: 0.95rem; cursor: pointer; }
    .btn-print:active  { background: #27a05f; }
    .btn-cancel:active { background: #333; }

    .no-jobs { color: #888; font-size: 1.1rem; padding: 2rem; }

    /* ── Utskrift pågår ── */
    .progress-ring {
      font-size: 4rem;
      animation: spin 1.5s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Framgång ── */
    .success-icon { font-size: 5rem; animation: pop 0.3s ease-out; }
    @keyframes pop { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

    /* ── Fel ── */
    .error-msg {
      background: #3a1a1a;
      border: 1px solid #8b0000;
      border-radius: 8px;
      padding: 1rem;
      color: #f87171;
      font-size: 1rem;
    }

    /* ── Knappar ── */
    .btn {
      background: #3a3a6a;
      border: none; border-radius: 10px;
      color: #fff; cursor: pointer;
      font-size: 1rem; padding: 0.8rem 2rem;
      transition: background 0.1s;
    }
    .btn:active { background: #5a5a9a; }
    .btn-logout { background: transparent; border: 1px solid #555; color: #888; }

    /* ── Sidfot ── */
    footer {
      position: fixed; bottom: 1rem;
      color: #444; font-size: 0.75rem;
    }
  </style>
</head>
<body>

  <!-- ① Väntar på kort -->
  <div id="sec-wait" class="section active">
    <div class="card-icon">💳</div>
    <h1>Säker utskrift</h1>
    <p>Sätt i ditt smartkort för att hämta dina utskrifter</p>
  </div>

  <!-- ② PIN-knappsats -->
  <div id="sec-pin" class="section">
    <h1>Ange PIN-kod</h1>
    <div class="pin-display" id="pin-dots"></div>
    <div class="numpad" id="numpad">
      <button onclick="pinKey('1')">1</button>
      <button onclick="pinKey('2')">2</button>
      <button onclick="pinKey('3')">3</button>
      <button onclick="pinKey('4')">4</button>
      <button onclick="pinKey('5')">5</button>
      <button onclick="pinKey('6')">6</button>
      <button onclick="pinKey('7')">7</button>
      <button onclick="pinKey('8')">8</button>
      <button onclick="pinKey('9')">9</button>
      <button class="btn-clear" onclick="pinClear()">⌫</button>
      <button onclick="pinKey('0')">0</button>
      <button class="btn-ok" onclick="pinSubmit()">OK</button>
    </div>
    <div id="pin-error" class="error-msg" style="display:none"></div>
  </div>

  <!-- ③ Jobblista -->
  <div id="sec-jobs" class="section">
    <div class="user-header">
      <div class="user-avatar">👤</div>
      <div>
        <div class="user-name" id="user-display-name"></div>
        <div class="user-upn"  id="user-upn"></div>
      </div>
    </div>
    <div class="jobs-list" id="jobs-list">
      <div class="no-jobs">Laddar utskrifter...</div>
    </div>
    <button class="btn btn-logout" onclick="logout()">Logga ut</button>
  </div>

  <!-- ④ Skriver ut -->
  <div id="sec-printing" class="section">
    <div class="progress-ring">⏳</div>
    <h1>Skriver ut...</h1>
    <p id="printing-title"></p>
  </div>

  <!-- ⑤ Klar -->
  <div id="sec-done" class="section">
    <div class="success-icon">✅</div>
    <h1>Klart!</h1>
    <p id="done-title"></p>
  </div>

  <!-- ⑥ Fel -->
  <div id="sec-error" class="section">
    <div style="font-size:4rem">⚠️</div>
    <h1>Något gick fel</h1>
    <div class="error-msg" id="error-detail"></div>
    <button class="btn" onclick="showJobs()">Tillbaka</button>
  </div>

  <footer>Terminal: {{ terminal_id }}</footer>

<script>
  // ── State ──────────────────────────────────────────────────
  let pin         = "";
  let currentUpn  = null;
  let lastCard    = false;
  let lastAuth    = false;

  // ── Visa/dölj sektioner ────────────────────────────────────
  function show(id) {
    document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
  }

  // ── PIN-hantering ──────────────────────────────────────────
  function updatePinDisplay() {
    document.getElementById("pin-dots").textContent = "●".repeat(pin.length) || " ";
  }

  function pinKey(d) {
    if (pin.length >= 12) return;
    pin += d;
    updatePinDisplay();
  }

  function pinClear() {
    pin = pin.slice(0, -1);
    updatePinDisplay();
  }

  async function pinSubmit() {
    if (pin.length < 4) return;
    document.getElementById("pin-error").style.display = "none";
    document.getElementById("numpad").style.opacity = "0.5";
    document.getElementById("numpad").style.pointerEvents = "none";

    try {
      const r = await fetch("/api/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({pin}),
      });
      const data = await r.json();

      if (r.ok) {
        currentUpn = data.upn;
        pin = "";
        updatePinDisplay();
        showJobs();
      } else {
        pin = "";
        updatePinDisplay();
        const el = document.getElementById("pin-error");
        el.textContent = data.error;
        el.style.display = "block";
      }
    } finally {
      document.getElementById("numpad").style.opacity  = "1";
      document.getElementById("numpad").style.pointerEvents = "auto";
    }
  }

  // ── Jobblista ──────────────────────────────────────────────
  async function showJobs() {
    show("sec-jobs");
    const upnParts = currentUpn ? currentUpn.split("@") : ["", ""];
    document.getElementById("user-display-name").textContent = upnParts[0];
    document.getElementById("user-upn").textContent          = currentUpn || "";

    const list = document.getElementById("jobs-list");
    list.innerHTML = '<div class="no-jobs">Laddar utskrifter...</div>';

    const r    = await fetch("/api/jobs");
    const jobs = await r.json();

    if (!jobs.length) {
      list.innerHTML = '<div class="no-jobs">Inga väntande utskrifter</div>';
      return;
    }

    list.innerHTML = jobs.map(j => `
      <div class="job-card" id="job-${j.id}">
        <div class="job-icon">📄</div>
        <div class="job-info">
          <div class="job-title" title="${esc(j.title)}">${esc(j.title)}</div>
          <div class="job-meta">${j.copies} kopia/or &nbsp;·&nbsp; ${j.size_kb} KB &nbsp;·&nbsp; ${j.submitted_at}</div>
        </div>
        <div class="job-actions">
          <button class="btn-print"  onclick="printJob('${j.id}','${esc(j.title)}')">Skriv ut</button>
          <button class="btn-cancel" onclick="cancelJob('${j.id}')">✕</button>
        </div>
      </div>
    `).join("");
  }

  function esc(s) {
    return String(s).replace(/[&<>"']/g, c =>
      ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
  }

  // ── Skriv ut ───────────────────────────────────────────────
  async function printJob(id, title) {
    show("sec-printing");
    document.getElementById("printing-title").textContent = title;

    const r    = await fetch(`/api/print/${id}`, {method: "POST"});
    const data = await r.json();

    if (r.ok) {
      show("sec-done");
      document.getElementById("done-title").textContent = title;
      // Automatisk återgång till jobblistan efter 3 sekunder
      setTimeout(showJobs, 3000);
    } else {
      show("sec-error");
      document.getElementById("error-detail").textContent = data.error;
    }
  }

  // ── Avbryt jobb ────────────────────────────────────────────
  async function cancelJob(id) {
    await fetch(`/api/cancel/${id}`, {method: "POST"});
    document.getElementById(`job-${id}`)?.remove();
    if (!document.querySelector(".job-card")) {
      document.getElementById("jobs-list").innerHTML =
        '<div class="no-jobs">Inga väntande utskrifter</div>';
    }
  }

  // ── Logga ut ───────────────────────────────────────────────
  async function logout() {
    await fetch("/api/logout", {method: "POST"});
    currentUpn = null;
    pin = "";
    updatePinDisplay();
    show("sec-wait");
  }

  // ── Polling: kortläge och autentisering ───────────────────
  async function poll() {
    try {
      const r    = await fetch("/api/status");
      const data = await r.json();

      // Kort borttaget → tillbaka till startsida
      if (lastAuth && !data.card_present) {
        currentUpn = null;
        show("sec-wait");
      }
      // Kort isatt → visa PIN om ej inloggad
      else if (data.card_present && !data.authenticated) {
        const current = document.querySelector(".section.active")?.id;
        if (current === "sec-wait") {
          pin = "";
          updatePinDisplay();
          document.getElementById("pin-error").style.display = "none";
          show("sec-pin");
        }
      }

      lastCard = data.card_present;
      lastAuth = data.authenticated;
    } catch (e) {
      /* server tillfälligt otillgänglig – försök igen */
    }
  }

  // Starta polling var 1.5:e sekund
  setInterval(poll, 1500);
  poll();
</script>
</body>
</html>
