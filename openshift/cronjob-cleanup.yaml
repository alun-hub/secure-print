# =============================================================================
# CronJob: rensar utgångna jobb från PostgreSQL och S3
# Körs varje timme
# =============================================================================
apiVersion: batch/v1
kind: CronJob
metadata:
  name: cups-cleanup
  namespace: secure-print
spec:
  schedule: "0 * * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: cleanup
              image: registry.company.com/secure-print/cups:latest
              command:
                - python3
                - -c
                - |
                  import os, boto3, psycopg2
                  from botocore.config import Config

                  conn = psycopg2.connect(os.environ["DATABASE_URL"])
                  s3 = boto3.client(
                      "s3",
                      endpoint_url=os.environ["S3_ENDPOINT"],
                      aws_access_key_id=os.environ["S3_ACCESS_KEY"],
                      aws_secret_access_key=os.environ["S3_SECRET_KEY"],
                      config=Config(signature_version="s3v4"),
                  )

                  with conn.cursor() as cur:
                      cur.execute("SELECT * FROM expire_old_jobs()")
                      expired = cur.fetchall()

                  conn.commit()
                  conn.close()

                  for (s3_key,) in expired:
                      try:
                          s3.delete_object(Bucket=os.environ["S3_BUCKET"], Key=s3_key)
                          print(f"Raderat: {s3_key}")
                      except Exception as e:
                          print(f"Fel vid borttagning av {s3_key}: {e}")

                  print(f"Klart: {len(expired)} utgångna jobb rensade")

              envFrom:
                - secretRef:
                    name: cups-env-secrets
