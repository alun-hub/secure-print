apiVersion: v1
kind: ServiceAccount
metadata:
  name: cups-sa
  namespace: secure-print
---
# OpenShift: ge ServiceAccount rätt att köra som root (krävs av CUPS)
# Binder till den inbyggda anyuid SCC
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: secure-print-cups-anyuid
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind:      ClusterRole
  name:      system:openshift:scc:anyuid
subjects:
  - kind:      ServiceAccount
    name:      cups-sa
    namespace: secure-print
